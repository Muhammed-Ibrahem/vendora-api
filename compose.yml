services:
  database:
    image: mysql:8.4
    container_name: mysql_db
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      retries: 5
      start_period: 10s

  migration:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: migration
    depends_on:
      database:
        condition: service_healthy

  vendora_api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: vendora_api
    depends_on:
      migration:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - |
          const http = require('http');
          const options = {
            hostname: 'localhost',
            port: process.env.PORT || 3000,
            path: '/api/v1/health',
            timeout: 2000
          };
          const req = http.get(options, (res) => {
            console.log('Status:', res.statusCode);
            process.exit(res.statusCode === 200 ? 0 : 1);
          });
          req.on('error', (err) => {
            console.error(err);
            process.exit(1);
          });
      interval: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      vendora_api:
        condition: service_healthy
